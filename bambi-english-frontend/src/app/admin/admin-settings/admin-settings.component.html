<div class="bg-white rounded-2xl shadow-sm border border-gray-100 max-w-4xl mx-auto">
  <div class="p-6 border-b border-gray-100 flex justify-between items-center">
    <h2 class="text-2xl font-black text-gray-800">Cài đặt Hệ thống</h2>
    <div *ngIf="saveSuccess()" class="bg-green-100 text-green-700 px-4 py-2 rounded-lg font-bold text-sm animate-pulse">
      Lưu thành công!
    </div>
  </div>

  <div *ngIf="loading()" class="flex justify-center py-20">
    <div class="w-12 h-12 border-4 border-bambi-orange border-t-transparent rounded-full animate-spin"></div>
  </div>

  <div *ngIf="!loading()" class="p-6 space-y-8">
    
    <!-- Thông tin chung -->
    <div>
      <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-bambi-orange">info</span>
        Thông tin chung
      </h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Tên Trung tâm</label>
          <input type="text" [(ngModel)]="settings.centerName" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-bambi-orange focus:border-transparent outline-none transition-shadow">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Link Logo</label>
          <input type="text" [(ngModel)]="settings.logoUrl" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-bambi-orange focus:border-transparent outline-none transition-shadow">
        </div>
      </div>
    </div>

    <hr class="border-gray-100">

    <!-- Liên hệ -->
    <div>
      <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-bambi-orange">contact_phone</span>
        Thông tin Liên hệ
      </h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Hotline chính</label>
          <input type="text" [(ngModel)]="settings.hotline" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-bambi-orange focus:border-transparent outline-none transition-shadow">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Email hỗ trợ</label>
          <input type="email" [(ngModel)]="settings.email" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-bambi-orange focus:border-transparent outline-none transition-shadow">
        </div>
      </div>
    </div>

    <hr class="border-gray-100">

    <!-- Mạng xã hội -->
    <div>
      <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined text-bambi-orange">share</span>
        Mạng xã hội
      </h3>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Facebook Fanpage Link</label>
          <input type="text" [(ngModel)]="settings.facebookLink" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-bambi-orange focus:border-transparent outline-none transition-shadow">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">YouTube Channel Link</label>
          <input type="text" [(ngModel)]="settings.youtubeLink" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-bambi-orange focus:border-transparent outline-none transition-shadow">
        </div>
      </div>
    </div>

    <!-- Nút lưu -->
    <div class="flex justify-end pt-6 mt-6">
      <button (click)="saveSettings()" [disabled]="saving()" class="bg-bambi-orange text-white px-8 py-3 rounded-xl font-bold hover:bg-orange-600 transition-colors shadow-lg shadow-orange-500/30 flex items-center gap-2 disabled:opacity-70">
        <span *ngIf="saving()" class="material-symbols-outlined animate-spin text-white mr-2">autorenew</span>
        <span>{{ saving() ? 'Đang lưu...' : 'Lưu Thay Đổi' }}</span>
      </button>
    </div>

  </div>
</div>
