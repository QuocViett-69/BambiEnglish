<div class="bg-white rounded-2xl shadow-sm border border-gray-100">
  <div class="p-6 border-b border-gray-100 flex justify-between items-center">
    <h2 class="text-2xl font-black text-gray-800">Quản lý Cơ sở</h2>
    <button (click)="openModal()" class="bg-bambi-orange text-white px-5 py-2.5 rounded-xl font-bold hover:bg-orange-600 transition-colors flex items-center gap-2">
      <span class="material-symbols-outlined">add</span>
      Thêm Cơ sở
    </button>
  </div>

  <div *ngIf="loading()" class="flex justify-center py-20">
    <div class="w-12 h-12 border-4 border-bambi-orange border-t-transparent rounded-full animate-spin"></div>
  </div>

  <div *ngIf="!loading()" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-6">
    <div *ngFor="let branch of branches()" class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5 relative group hover:border-bambi-orange transition-colors">
      <div class="absolute top-4 right-4 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
        <button (click)="openModal(branch)" class="bg-blue-100 text-blue-600 p-2 rounded-lg hover:bg-blue-200">
          <span class="material-symbols-outlined text-[16px]">edit</span>
        </button>
        <button (click)="deleteBranch(branch._id)" class="bg-red-100 text-red-600 p-2 rounded-lg hover:bg-red-200">
          <span class="material-symbols-outlined text-[16px]">delete</span>
        </button>
      </div>

      <h3 class="font-bold text-lg text-gray-800 pr-16 mb-2">{{ branch.name }}</h3>
      <div class="text-sm text-gray-600 space-y-2">
        <div class="flex items-start gap-2">
          <span class="material-symbols-outlined text-[18px]">location_on</span>
          <span class="line-clamp-2">{{ branch.address }}</span>
        </div>
        <div class="flex items-start gap-2">
          <span class="material-symbols-outlined text-[18px]">call</span>
          <span>{{ branch.phone }}</span>
        </div>
        <div class="flex items-start gap-2">
          <span class="material-symbols-outlined text-[18px]">schedule</span>
          <span>{{ branch.openingHours }}</span>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Thêm/Sửa Cơ sở -->
<div *ngIf="isModalOpen" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl">
    <div class="p-6 border-b border-gray-100 flex justify-between items-center">
      <h3 class="text-xl font-bold text-gray-800">{{ editingBranch._id ? 'Sửa Cơ sở' : 'Thêm Cơ sở mới' }}</h3>
      <button (click)="closeModal()" class="text-gray-400 hover:text-gray-600">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    
    <div class="p-6 space-y-4">
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">Tên cơ sở</label>
        <input type="text" [(ngModel)]="editingBranch.name" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-bambi-orange outline-none">
      </div>
      <div>
        <label class="block text-sm font-bold text-gray-700 mb-1">Địa chỉ</label>
        <input type="text" [(ngModel)]="editingBranch.address" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-bambi-orange outline-none">
      </div>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Số điện thoại</label>
          <input type="text" [(ngModel)]="editingBranch.phone" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-bambi-orange outline-none">
        </div>
        <div>
          <label class="block text-sm font-bold text-gray-700 mb-1">Giờ mở cửa</label>
          <input type="text" [(ngModel)]="editingBranch.openingHours" class="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-bambi-orange outline-none">
        </div>
      </div>
    </div>
    
    <div class="p-6 border-t border-gray-100 flex justify-end gap-3 bg-gray-50 rounded-b-3xl">
      <button (click)="closeModal()" class="px-5 py-2 rounded-lg font-bold text-gray-600 hover:bg-gray-200">Hủy</button>
      <button (click)="saveBranch()" class="px-5 py-2 rounded-lg font-bold bg-bambi-orange text-white hover:bg-orange-600">Lưu lại</button>
    </div>
  </div>
</div>
