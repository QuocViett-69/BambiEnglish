<div class="max-w-4xl mx-auto px-4 py-16">
  <div *ngIf="loading()" class="flex justify-center py-20">
    <div class="w-12 h-12 border-4 border-bambi-orange border-t-transparent rounded-full animate-spin"></div>
  </div>

  <div *ngIf="course() && !loading()" class="glass-card overflow-hidden">
    <img [src]="course()!.imageUrl" [alt]="course()!.title" class="w-full h-80 object-cover" />
    <div class="p-8 md:p-12 relative">
      <!-- Back button -->
      <a routerLink="/" class="absolute top-6 left-6 flex items-center justify-center w-10 h-10 bg-white/80 backdrop-blur rounded-full text-bambi-orange hover:bg-bambi-orange hover:text-white transition-all shadow">
        ←
      </a>
      
      <h1 class="text-4xl font-black font-display mt-4 mb-4 text-bambi-green">{{ course()!.title }}</h1>
      <p class="text-gray-600 mb-8 text-lg leading-relaxed">{{ course()!.shortDescription }}</p>

      <div class="bg-bambi-green/10 border border-bambi-green/20 rounded-2xl p-6 mb-8 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
        <div>
          <span class="text-gray-600 font-bold block mb-1">Học phí lộ trình</span>
          <span class="text-sm text-gray-500">Thanh toán linh hoạt theo tháng hoặc khóa học</span>
        </div>
        <span class="text-bambi-orange text-3xl font-black">{{ formatPrice(course()!.price) }}</span>
      </div>

      <a [routerLink]="['/dang-ky', course()!._id]"
         class="block w-full text-center bg-bambi-orange text-white font-bold py-4 rounded-full text-lg hover:shadow-[0_6px_20px_rgba(255,107,53,0.3)] hover:-translate-y-1 transition-all">
        🎉 Đăng ký học trải nghiệm
      </a>
    </div>
  </div>
</div>
