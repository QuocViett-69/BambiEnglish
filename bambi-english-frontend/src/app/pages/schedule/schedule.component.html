<div class="max-w-4xl mx-auto px-4 py-12">
  <h1 class="text-3xl font-black font-display text-gray-800 mb-6 text-center">📅 Lịch học của bạn</h1>
  <div class="bg-white rounded-2xl shadow-lg p-8">
    <p class="text-gray-500 mb-6 text-center">Dưới đây là lịch học dự kiến của học viên tại Bambi English.</p>
    
    <div class="grid md:grid-cols-2 gap-6">
      <div *ngFor="let s of schedule" class="bg-bambi-light p-6 rounded-xl border border-orange-100 flex flex-col items-center justify-center text-center transition-transform hover:-translate-y-1">
         <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center text-2xl mb-4 shadow-sm text-bambi-orange">🕒</div>
         <h3 class="font-bold text-gray-800 text-lg mb-1">{{s.day}}</h3>
         <p class="text-bambi-orange font-black text-xl mb-2">{{s.time}}</p>
         <p class="text-gray-500 text-sm">📍 {{s.room}}</p>
      </div>
    </div>
    
    <div class="mt-10 text-center flex flex-col sm:flex-row justify-center gap-4">
      <a routerLink="/" class="inline-block bg-gray-100 text-gray-600 font-bold px-6 py-3 rounded-full hover:bg-gray-200 transition-colors w-full sm:w-auto">
        Quay lại trang chủ
      </a>
    </div>
  </div>
</div>
