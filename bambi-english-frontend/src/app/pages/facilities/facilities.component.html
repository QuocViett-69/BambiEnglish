<div class="bg-gray-50 min-h-screen py-16">
  <div class="max-w-7xl mx-auto px-4">
    <!-- Header -->
    <div class="text-center mb-12">
      <h1 class="text-4xl md:text-5xl font-black font-display text-bambi-green mb-4">Cơ Sở Vật Chất</h1>
      <p class="text-lg text-gray-600 max-w-2xl mx-auto">
        Không gian học tập thân thiện, an toàn và hiện đại, giúp các bé thỏa sức sáng tạo và phát huy tối đa năng lực ngôn ngữ.
      </p>
    </div>

    <!-- Filter Tabs -->
    <div class="flex flex-wrap justify-center gap-3 mb-12">
      <button 
        *ngFor="let cat of categories" 
        (click)="setCategory(cat)"
        class="px-6 py-2.5 rounded-full font-semibold transition-all duration-300 shadow-sm border border-gray-200"
        [ngClass]="activeCategory === cat ? 'bg-bambi-orange text-white border-transparent' : 'bg-white text-gray-600 hover:bg-gray-50'">
        {{ cat }}
      </button>
    </div>

    <!-- Image Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <div *ngFor="let img of filteredImages" class="group relative rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500 cursor-pointer h-64 glass-card border-0">
        
        <!-- Image placeholder with object-cover -->
        <img [src]="img.url" [alt]="img.title" class="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700" loading="lazy" />
        
        <!-- Overlay -->
        <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-6">
          <span class="text-bambi-orange text-xs font-bold uppercase tracking-wider mb-1">{{ img.category }}</span>
          <h3 class="text-white font-bold text-lg leading-tight">{{ img.title }}</h3>
        </div>
      </div>
    </div>
    
  </div>
</div>
